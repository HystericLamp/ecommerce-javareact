name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Deploy to Netlify
        run: curl -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}"